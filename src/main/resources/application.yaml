server:
  port: 8081
spring:
  application:
    name: city-guide
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/city_guide?useSSL=false&serverTimezone=UTC
    username: root
    password: *******
  redis:
    host: 127.0.0.1
    port: 6379
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.city.guide.entity # 别名扫描包
logging:
  level:
    com.city.guide: debug